<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파일 바로가기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f6f9;
      color: #1f2937;
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    header {
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 2rem;
      line-height: 1.2;
    }

    .sub {
      margin: 0;
      color: #667085;
      font-size: 1rem;
    }

    section {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid #d8dee8;
      border-radius: 12px;
      background: #fff;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.25rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    a {
      display: block;
      min-height: 58px;
      padding: 16px 18px;
      border: 1px solid #d8dee8;
      border-radius: 10px;
      background: #f9fafb;
      color: #111827;
      text-decoration: none;
      font-size: 1.02rem;
      font-weight: 700;
    }

    a:hover {
      background: #eef4ff;
      border-color: #8fb2ff;
    }

    .linux a:hover {
      background: #ecfdf3;
      border-color: #68c992;
    }

    @media (max-width: 680px) {
      h1 {
        font-size: 1.55rem;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      a {
        min-height: 54px;
        padding: 15px 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>파일 바로가기</h1>
      <p class="sub">리눅스 학습 파일과 3D 연습 파일을 구역별로 나눴습니다.</p>
    </header>

    <section class="linux">
      <h2>리눅스 학습</h2>
      <div class="buttons">
        <a href="linux-study-hub/index.html">리눅스 학습 허브</a>
        <a href="linux-study-hub/summary.html">핵심요약집</a>
        <a href="linux-study-hub/practice.html">80문항 실전 연습</a>
        <a href="linux-study-hub/supplement.html">보강 40문항</a>
      </div>
    </section>

    <section>
      <h2>3D / AR 연습</h2>
      <div class="buttons">
        <a href="BabylonEx01.html">BabylonEx01 - 기본 3D 장면</a>
        <a href="BabylonEx02.html">BabylonEx02 - 도형 배치</a>
        <a href="marker1.html">기본 마커 AR</a>
        <a href="location.html">위치 기반 AR</a>
        <a href="virtual-floor.html">가상 바닥 AR</a>
        <a href="booth-street.html">가상 축제 거리 AR</a>
        <a href="moon.html">캔버스 시계 실험</a>
      </div>
    </section>
  </main>
</body>
</html>
